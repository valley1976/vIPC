{
    "application": "vIPC",
    "description": "智能驾驶车辆实时通信与故障安全配置，涵盖传感器、感知、定位、规划、控制、监控、故障管理、SOTIF及测试域。",
    "executor": [
        {"name": "camera_driver", 
            "task": ["capture", "isp_process", "encode", "check_health"], 
            "asil": "ASIL-B", 
            "description": "主前视摄像头驱动，负责图像采集、ISP处理、编码及健康检查"
        },
        {
            "name": "camera_driver_secondary", 
            "task": ["capture", "isp_process", "encode", "check_health"], 
            "asil": "ASIL-B", 
            "description": "冗余前视摄像头驱动，用于故障切换及双通道仲裁"
        },
        {
            "name": "lidar_driver", 
            "task": ["scan", "preprocess", "pointcloud_segment", "check_health"], 
            "asil": "ASIL-B", 
            "description": "主激光雷达驱动，执行扫描、预处理、点云分割及健康监控"
        },
        {
            "name": "lidar_driver_secondary", 
            "task": ["scan", "preprocess", "pointcloud_segment", "check_health"], 
            "asil": "ASIL-B", 
            "description": "冗余激光雷达驱动，提供备用点云数据，支持冗余切换"
        },
        {
            "name": "radar_driver", 
            "task": ["track", "noise_filter", "check_health"], 
            "asil": "ASIL-A", 
            "description": "角雷达驱动，负责目标跟踪、噪声滤波及自检"
        },
        {   
            "name": "gnss_imu_driver", 
            "task": ["decode", "time_sync", "check_health"], 
            "asil": "ASIL-B", 
            "description": "GNSS/IMU组合导航驱动，解码卫星与惯性数据，时间同步及健康检查"
        },
        {
            "name": "perception_fusion", 
            "task": ["associate", "state_track", "motion_predict", "validate_input"], 
            "asil": "ASIL-D", 
            "description": "多传感器融合感知，执行目标关联、状态跟踪、运动预测及输入校验"
        },
        {
            "name": "perception_lane", 
            "task": ["detect", "curve_fit", "validate_output"], 
            "asil": "ASIL-B", 
            "description": "车道线检测与拟合，输出车道边界并校验结果一致性"
        },
        {
            "name": "perception_signal", 
            "task": ["detect", "classify", "validate_output"], 
            "asil": "ASIL-A", 
            "description": "交通信号灯检测与分类，输出灯色状态及校验"
        },
        {
            "name": "localization_estimator", 
            "task": ["pose_estimate", "odometry_update", "check_confidence"], 
            "asil": "ASIL-D", 
            "description": "高精度定位估计，融合多源数据计算全局位姿、航迹更新及置信度评估"
        },
        {
            "name": "planning_decision", 
            "task": ["scenario_parse", "state_machine", "handle_fault_response"], 
            "asil": "ASIL-D", 
            "description": "行为决策层，解析驾驶场景、运行状态机并处理故障响应"
        },
        {
            "name": "planning_trajectory", 
            "task": ["optimize_path", "optimize_speed", "check_collision",
                "select_mrm_strategy", "execute_mrm_pull_over", "execute_mrm_emergency_stop", "execute_mrm_creep"
            ], 
            "asil": "ASIL-D", 
            "description": "轨迹规划与最小风险机动（MRM）执行，包括路径/速度优化、碰撞检查及多种MRM策略"
        },
        {
            "name": "control_tracker", 
            "task": ["compute_lqr", "feedforward_calc", "map_actuator", "limit_by_fault"], 
            "asil": "ASIL-D", 
            "description": "车辆横向/纵向跟踪控制，计算LQR控制量、前馈补偿、执行器映射及故障限幅"
        },
        {
            "name": "vehicle_can_bridge", 
            "task": ["transmit", "receive", "self_diagnose", "monitor_timeout"], 
            "asil": "ASIL-C", 
            "description": "CAN总线桥接，负责指令下发、信号接收、自诊断及超时监控"
        },
        {
            "name": "monitor_guardian", 
            "task": ["health_check", "measure_latency", "trigger_recovery", "monitor_fault_status"], 
            "asil": "ASIL-B", 
            "description": "系统健康监护，检查各节点心跳、测量端到端延迟、触发恢复流程并监控故障状态"
        },
        {
            "name": "fault_manager", 
            "task": [
                "heartbeat_aggregate", "fault_classify", "execute_fallback",
                "dual_channel_vote", "asil_grade_assess", "redundancy_switch",
                "apply_degradation_matrix"
            ], 
            "asil": "ASIL-D", 
            "description": "故障管理核心，聚合心跳、分类故障、执行降级、双通道表决、ASIL等级评估、冗余切换及降级矩阵应用"
        },
        {
            "name": "fault_injector", 
            "task": ["inject_timeout", "inject_corrupt_data", "inject_latency_spike", "log_injection_result"], 
            "asil": "ASIL-B", 
            "description": "故障注入测试工具（仅测试模式），模拟超时、数据损坏、延迟尖峰并记录结果"
        },
        {
            "name": "sotif_analyzer", 
            "task": ["monitor_odd_boundary", "assess_performance_limitation", "detect_unknown_object", "trigger_sotif_degradation"], 
            "asil": "ASIL-C", 
            "description": "SOTIF分析器，监控ODD边界、评估性能局限、检测未知物体并触发功能降级"
        },
        {
            "name": "config_manager", 
            "task": ["load_asil_matrix", "load_mrm_params", "load_odd_definition", "reload_dynamic"], 
            "description": "配置管理节点，加载ASIL降级矩阵、MRM参数、ODD定义并支持动态重载"
        }
    ],
    "channel_group": [
        {
            "name": "/sensor",
            "subscriber": ["time_align", "recorder"],
            "description": "传感器原始数据域，发布各传感器驱动输出的原始消息，供感知和监控订阅",
            "channel": [
                {"name": "/sensor/camera/front", "subscriber": ["perception_fusion", "perception_lane", "monitor_guardian", "fault_manager", "sotif_analyzer"], "description": "前视主摄像头图像数据"},
                {"name": "/sensor/camera/front_secondary", "subscriber": ["perception_fusion", "fault_manager"], "description": "前视冗余摄像头图像数据，用于双通道仲裁"},
                {"name": "/sensor/camera/rear", "subscriber": ["perception_fusion", "perception_lane"], "description": "后视摄像头图像数据"},
                {"name": "/sensor/lidar/main", "subscriber": ["perception_fusion", "perception_lane", "fault_manager", "sotif_analyzer"], "description": "主激光雷达点云数据"},
                {"name": "/sensor/lidar/secondary", "subscriber": ["perception_fusion", "fault_manager"], "description": "冗余激光雷达点云数据"},
                {"name": "/sensor/radar/corner", "subscriber": ["perception_fusion"], "description": "角雷达目标列表数据"},
                {"name": "/sensor/gnss/rtk_pose", "subscriber": ["localization_estimator", "fault_manager"], "description": "RTK定位位姿数据"},
                {"name": "/sensor/imu/raw", "subscriber": ["localization_estimator", "planning_trajectory"], "description": "IMU原始惯性测量数据"}
            ]
        },
        {
            "name": "/perception",
            "subscriber": ["monitor", "recorder"],
            "description": "感知结果域，输出融合目标、车道线、交通灯、可行驶区域等高级语义信息",
            "channel": [
                {"name": "/perception/fused_objects", "subscriber": ["planning_decision", "planning_trajectory", "monitor_guardian", "fault_manager", "sotif_analyzer"], "description": "融合后的动态障碍物目标列表"},
                {"name": "/perception/lane_boundaries", "subscriber": ["planning_trajectory", "control_tracker"], "description": "车道边界线（左右侧）拟合结果"},
                {"name": "/perception/traffic_signals", "subscriber": ["planning_decision"], "description": "交通信号灯状态（颜色、倒计时）"},
                {"name": "/perception/drivable_area", "subscriber": ["planning_trajectory", "control_tracker"], "description": "可行驶区域（freespace）边界信息"}
            ]
        },
        {
            "name": "/localization",
            "subscriber": ["monitor"],
            "description": "定位域，发布全局位姿和车辆里程计信息",
            "channel": [
                {"name": "/localization/global_pose", "subscriber": ["planning_decision", "planning_trajectory", "fault_manager"], "description": "全局坐标系下的车辆位姿（x, y, yaw, 协方差）"},
                {"name": "/localization/vehicle_odom", "subscriber": ["planning_trajectory", "control_tracker"], "description": "车辆里程计（速度、角速度、累计距离）"}
            ]
        },
        {
            "name": "/planning",
            "subscriber": ["monitor", "visualizer"],
            "description": "规划决策域，发布参考轨迹、决策状态及MRM命令",
            "channel": [
                {"name": "/planning/reference_trajectory", "subscriber": ["control_tracker", "vehicle_can_bridge", "monitor_guardian", "fault_manager"], "description": "最终下发的参考轨迹（路径点+速度曲线）"},
                {"name": "/planning/decision_status", "subscriber": ["control_tracker", "monitor_guardian"], "description": "当前决策状态（变道、跟车、停车等）"},
                {"name": "/planning/mrm_command", "subscriber": ["fault_manager", "sotif_analyzer"], "description": "最小风险机动触发命令，包含严重等级和动作类型"}
            ]
        },
        {
            "name": "/control",
            "subscriber": ["monitor", "recorder"],
            "description": "控制域，发布执行器指令和车辆反馈信号",
            "channel": [
                {"name": "/control/actuator_command", "subscriber": ["vehicle_can_bridge", "monitor_guardian", "fault_manager"], "description": "计算得到的油门/刹车/转向/档位等执行器命令"},
                {"name": "/control/vehicle_feedback", "subscriber": ["planning_trajectory", "monitor_guardian"], "description": "车辆实际反馈（车速、横摆角、方向盘转角等）"}
            ]
        },
        {
            "name": "/monitor",
            "subscriber": ["logger", "alert_manager"],
            "description": "监控域，用于记录日志、告警及系统健康数据",
            "channel": [
                {"name": "/monitor/hw_diagnostics", "subscriber": ["vehicle_can_bridge", "perception_fusion", "fault_manager"], "description": "硬件诊断信息（CAN错误、传感器异常等）"},
                {"name": "/monitor/end_to_end_latency", "subscriber": ["planning_trajectory", "control_tracker", "fault_manager"], "description": "端到端延迟统计（从感知到控制输出的时间戳差）"}
            ]
        },
        {
            "name": "/fault",
            "subscriber": ["logger", "hmi_alerter", "blackbox"],
            "description": "故障管理域，处理诊断事件、降级指令、冗余切换及MRM触发",
            "channel": [
                {"name": "/fault/heartbeat_collection", "subscriber": ["fault_manager", "monitor_guardian"], "description": "各节点心跳汇总消息"},
                {"name": "/fault/diagnostic_events", "subscriber": ["fault_manager", "planning_decision", "vehicle_can_bridge", "perception_fusion"], "description": "原始诊断事件（超时、数据异常、校验失败等）"},
                {"name": "/fault/degradation_level", "subscriber": ["perception_fusion", "planning_trajectory", "control_tracker", "localization_estimator"], "description": "当前系统降级等级（NORMAL/DEGRADED/EMERGENCY）"},
                {"name": "/fault/recovery_command", "subscriber": ["camera_driver", "camera_driver_secondary", "lidar_driver", "lidar_driver_secondary", "gnss_imu_driver", "vehicle_can_bridge"], "description": "冗余切换或恢复指令（如重启驱动、切换主备）"},
                {"name": "/fault/mrm_trigger", "subscriber": ["planning_trajectory", "control_tracker", "vehicle_can_bridge"], "description": "MRM触发信号（包含严重等级，由fault_manager裁决）"},
                {"name": "/fault/asil_current_level", "subscriber": ["planning_trajectory", "control_tracker", "perception_fusion", "localization_estimator"], "description": "当前系统ASIL等级（动态调整，用于控制算法限幅）"},
                {"name": "/fault/redundancy_status", "subscriber": ["fault_manager", "monitor_guardian"], "description": "冗余传感器健康状态及切换记录"},
                {"name": "/fault/injection_interface", "subscriber": ["fault_injector", "monitor_guardian"], "description": "故障注入控制接口，接收外部注入指令"}
            ]
        },
        {
            "name": "/config",
            "subscriber": ["config_manager"],
            "description": "配置管理域，加载和动态更新各类策略参数，供运行时节点查询",
            "channel": [
                {
                    "name": "/config/asil_degradation_matrix",
                    "subscriber": ["fault_manager", "planning_trajectory", "sotif_analyzer"],
                    "description": "ASIL降级映射矩阵，定义不同故障组合下的目标ASIL等级"
                },
                {
                    "name": "/config/mrm_parameter_set",
                    "subscriber": ["planning_trajectory", "control_tracker"],
                    "description": "MRM动作参数集（靠边速度、减速度、转向限值等）"
                },
                {
                    "name": "/config/odd_definition",
                    "subscriber": ["sotif_analyzer", "config_manager"],
                    "description": "ODD属性枚举与边界阈值，用于实时判定是否超出设计运行域。",
                    "schema": {
                        "road_environment": {
                            "description": "道路环境属性，包括道路类型、路面状态、标线质量及几何参数",
                            "road_type": {
                                "enum": ["Highway", "Urban_Arterial", "Urban_Residential", "Rural", "Parking_Lot", "Tunnel", "Bridge", "Construction_Zone"],
                                "current": "Urban_Arterial",
                                "description": "当前道路类型"
                            },
                            "road_surface": {
                                "enum": ["Dry", "Damp", "Wet", "Flooded", "Snow", "Ice", "Gravel"],
                                "current": "Dry",
                                "description": "路面附着条件"
                            },
                            "lane_marking_quality": {
                                "enum": ["Clear", "Faded", "Occluded", "Missing"],
                                "current": "Clear",
                                "description": "车道线可见性质量"
                            },
                            "road_geometry": {
                                "description": "道路几何参数",
                                "curvature_radius_m": {"min": 0, "max": 1000, "current": 250, "description": "当前曲率半径（米）"},
                                "grade_percent": {"min": -15, "max": 15, "current": 2, "description": "当前坡度百分比"}
                            }
                        },
                        "atmospheric_conditions": {
                            "description": "大气环境条件，包含天气、能见度、风速和温度",
                            "weather": {
                                "enum": ["Clear", "Cloudy", "Drizzle", "LightRain", "ModerateRain", "HeavyRain", "Thunderstorm", "LightSnow", "HeavySnow", "Fog_Light", "Fog_Dense", "Sandstorm"],
                                "current": "Clear",
                                "description": "当前天气类型"
                            },
                            "visibility_m": {"min": 0, "max": 10000, "current": 500, "warning_threshold": 150, "description": "当前能见度（米），低于阈值时告警"},
                            "wind_speed_mps": {"min": 0, "max": 40, "current": 5, "warning_threshold": 15, "description": "当前风速（米/秒）"},
                            "ambient_temperature_c": {"min": -40, "max": 85, "current": 25, "description": "环境温度（摄氏度）"}
                        },
                        "illumination": {
                            "description": "光照条件，包括光照类型和太阳眩光程度",
                            "lighting_condition": {
                                "enum": ["Daylight_Sunny", "Daylight_Overcast", "Night_StreetLit", "Night_Unlit", "Dawn", "Dusk", "Tunnel_Lit", "Tunnel_Unlit"],
                                "current": "Daylight_Sunny",
                                "description": "当前光照场景"
                            },
                            "sun_glare": {
                                "enum": ["None", "Low", "Medium", "High"],
                                "current": "None",
                                "description": "太阳直射眩光等级"
                            }
                        },
                        "traffic_conditions": {
                            "description": "交通状况，包含车流密度、平均车速、信号灯状态及道路使用者密度",
                            "traffic_density": {
                                "enum": ["FreeFlow", "Light", "Moderate", "Heavy", "Standstill"],
                                "current": "FreeFlow",
                                "description": "当前交通流密度"
                            },
                            "average_speed_kph": {"min": 0, "max": 150, "current": 60, "description": "周边车辆平均速度（公里/小时）"},
                            "traffic_light_state": {
                                "enum": ["Green", "Yellow", "Red", "Flashing_Yellow", "Flashing_Red", "Unknown", "Not_Applicable"],
                                "current": "Green",
                                "description": "当前交通灯状态"
                            },
                            "road_user_density": {"enum": ["Sparse", "Moderate", "Dense"], "current": "Sparse", "description": "行人/非机动车密度"}
                        },
                        "digital_environment": {
                            "description": "数字信息环境，包括高精地图可用性、GNSS质量和V2X连接状态",
                            "hd_map_availability": {"enum": ["Available", "Outdated_>1min", "Unavailable"], "current": "Available", "description": "高精地图数据新鲜度"},
                            "gnss_quality": {
                                "enum": ["RTK_FIX", "Float", "DGPS", "Standalone", "DeadReckoning", "Invalid"],
                                "current": "RTK_FIX",
                                "description": "GNSS定位精度等级"
                            },
                            "v2x_connectivity": {"enum": ["Connected", "Intermittent", "Disconnected"], "current": "Connected", "description": "V2X通信连接状态"}
                        },
                        "vehicle_operational_limits": {
                            "description": "自车操作极限参数，用于评估当前运动状态是否在安全包络内",
                            "ego_speed_kph": {"min": 0, "max": 120, "current": 50, "description": "自车当前速度（公里/小时）"},
                            "yaw_rate_degps": {"min": -30, "max": 30, "current": 2, "description": "自车横摆角速度（度/秒）"},
                            "longitudinal_accel_mps2": {"min": -6, "max": 4, "current": 0.5, "description": "自车纵向加速度（米/秒²）"},
                            "path_tracking_confidence": {"min": 0, "max": 1, "current": 0.95, "warning_threshold": 0.7, "description": "路径跟踪置信度（0-1），低于阈值时告警"}
                        }
                    }
                },
                {
                    "name": "/config/sotif_scenario_triggers",
                    "subscriber": ["sotif_analyzer"],
                    "description": "基于ODD枚举值的触发规则：当任何属性超出定义范围时，触发SOTIF降级。",
                    "rules": [
                        {"condition": "weather in ['HeavyRain', 'Thunderstorm', 'HeavySnow', 'Fog_Dense']", "action": "trigger_odd_exit", "priority": "HIGH", "description": "恶劣天气导致ODD退出"},
                        {"condition": "visibility_m < 150 AND ego_speed_kph > 40", "action": "trigger_speed_cap", "target": 30, "description": "低能见度时限制最高车速"},
                        {"condition": "road_surface in ['Wet', 'Flooded', 'Ice'] AND curvature_radius_m < 150", "action": "disable_lane_change", "priority": "MEDIUM", "description": "湿滑或结冰路面且弯道较急时禁止变道"},
                        {"condition": "gnss_quality in ['Standalone', 'Invalid'] AND hd_map_availability == 'Unavailable'", "action": "force_dead_reckoning_limited", "timeout_sec": 10, "description": "GNSS失效且无高精地图时，启用有限航迹推算并设定超时"},
                        {"condition": "sun_glare in ['Medium', 'High'] AND lane_marking_quality in ['Faded', 'Occluded']", "action": "trigger_perception_degradation", "description": "强逆光+车道线模糊时触发感知降级"},
                        {"condition": "traffic_density == 'Standstill' AND ego_speed_kph > 5", "action": "adjust_planning_horizon", "reduce_to_meters": 30, "description": "拥堵静止车流中，自车仍有速度时缩短规划时距"},
                        {"condition": "path_tracking_confidence < 0.7 AND ego_speed_kph > 20", "action": "request_safety_stop", "description": "路径跟踪置信度低且速度较高时请求安全停车"}
                    ]
                }
            ]
        },
        {
            "name": "/test",
            "subscriber": ["test_harness", "record_replay"],
            "description": "测试域，用于故障注入结果反馈和SOTIF覆盖缺口分析",
            "channel": [
                {"name": "/test/fault_injection_status", "subscriber": ["fault_injector", "monitor_guardian"], "description": "故障注入执行状态及结果回传"},
                {"name": "/test/sotif_coverage_gaps", "subscriber": ["sotif_analyzer", "config_manager"], "description": "SOTIF场景覆盖缺口分析报告"}
            ]
        },
        {
            "name": "/sotif",
            "subscriber": ["logger", "hmi_alerter"],
            "description": "SOTIF专用域，发布ODD退出告警、未知物体风险及感知不确定性信号",
            "channel": [
                {"name": "/sotif/odd_exit_warning", "subscriber": ["planning_decision", "fault_manager"], "description": "ODD边界即将或已经退出的警告"},
                {"name": "/sotif/unknown_obstacle_risk", "subscriber": ["planning_trajectory", "fault_manager"], "description": "未知类型障碍物（如散落物）风险等级通知"},
                {"name": "/sotif/perception_uncertainty", "subscriber": ["perception_fusion", "planning_trajectory"], "description": "感知结果不确定性估计，用于规划层保守决策"}
            ]
        }
    ]
}